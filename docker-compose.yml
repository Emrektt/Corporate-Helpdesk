version: '3.9'

# ═══════════════════════════════════════════════════════════
#  Corporate Helpdesk — Docker Compose
#  Kullanım: docker compose up -d --build
# ═══════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Veritabanı ──────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: helpdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-helpdesk}
      POSTGRES_USER:     ${POSTGRES_USER:-helpdesk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecretPassword123!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helpdesk_user} -d ${POSTGRES_DB:-helpdesk}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - helpdesk_net

  # ── FastAPI Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helpdesk_backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-helpdesk}
      POSTGRES_USER:     ${POSTGRES_USER:-helpdesk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecretPassword123!}
      TENANT_ID:         ${TENANT_ID:-}
      BACKEND_CLIENT_ID: ${BACKEND_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - helpdesk_net
    # Geliştirme sırasında doğrudan erişim için (opsiyonel)
    ports:
      - "8001:8001"

  # ── React Frontend (Nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build zamanında MSAL değişkenleri enjekte edilir
        VITE_MSAL_CLIENT_ID:     ${VITE_MSAL_CLIENT_ID:-}
        VITE_MSAL_TENANT_ID:     ${VITE_MSAL_TENANT_ID:-}
        VITE_MSAL_REDIRECT_URI:  ${VITE_MSAL_REDIRECT_URI:-http://localhost}
        VITE_MSAL_API_SCOPE:     ${VITE_MSAL_API_SCOPE:-}
    container_name: helpdesk_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - helpdesk_net

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  helpdesk_net:
    driver: bridge
