name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling "fastapi>=0.111.0" "uvicorn[standard]>=0.30.1" "sqlalchemy>=2.0.31" "psycopg[binary]>=3.2.1" "alembic>=1.13.2" "pydantic[email]>=2.8.2" "pydantic-settings>=2.3.4" "python-multipart>=0.0.9" "PyJWT>=2.8.0" "httpx>=0.27.0" "passlib[bcrypt]>=1.7.4" "pytest>=8.0.0" "pytest-asyncio>=0.23.0"

      - name: Run Backend Tests
        env:
          PYTHONPATH: .
        run: |
          cd backend
          pytest -v

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm run test
        
      - name: Run Linter
        working-directory: frontend
        run: npm run lint
        
      - name: Build Frontend
        working-directory: frontend
        run: npm run build

  e2e-test:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Compose
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 15

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        working-directory: e2e
        run: npx playwright test --project=chromium
